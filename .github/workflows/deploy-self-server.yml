name: Deploy Self Server

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

env:
  FRONTEND_REPOSITORY: ${{ vars.FRONTEND_REPOSITORY || 'KeithDuiZhang/love-match-frontend-main' }}
  FRONTEND_REF: ${{ vars.FRONTEND_REF || 'main' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ env.FRONTEND_REF }}
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js 20.20.2
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync unzip openssh-client
          npm install -g npm@10.8.2 pnpm@10.33.0
          node -v
          npm -v
          pnpm -v

      - name: Build backend
        working-directory: backend
        run: |
          mvn -B -DskipTests clean package -pl yudao-server -am
          mkdir -p ../release/backend
          cp yudao-server/target/yudao-server.jar ../release/backend/yudao-server.jar

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_URL: ''
          VITE_GLOB_API_URL: /admin-api
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:antd
          mkdir -p ../release/frontend
          rm -rf ../release/frontend/*
          if [ -f apps/web-antd/dist.zip ]; then
            unzip -q apps/web-antd/dist.zip -d ../release/frontend
          else
            rsync -a --delete apps/web-antd/dist/ ../release/frontend/
          fi

      - name: Upload and deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          test -n "${SERVER_HOST}"
          test -n "${SERVER_PORT}"
          test -n "${SERVER_USER}"
          test -n "${SERVER_SSH_KEY}"
          test -n "${DEPLOY_DIR}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          printf '%s\n' "${SERVER_SSH_KEY}" | tr -d '\r' | ssh-add -

          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${DEPLOY_DIR}'"
          rsync -a --delete \
            --exclude='.env' \
            --exclude='mysql/' \
            --exclude='redis/' \
            --exclude='logs/' \
            --exclude='backups/' \
            --exclude='backend/yudao-server.jar' \
            --exclude='nginx/html/admin/' \
            --exclude='nginx/cert/' \
            -e "ssh -p ${SERVER_PORT}" \
            backend/deploy/ "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_DIR}/"
          rsync -a --delete -e "ssh -p ${SERVER_PORT}" release/ "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_DIR}/release/"
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "cd '${DEPLOY_DIR}' && chmod +x scripts/*.sh && ./scripts/deploy.sh"
