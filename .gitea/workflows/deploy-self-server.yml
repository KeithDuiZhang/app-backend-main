name: Deploy Self Server

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

env:
  GITEA_INTERNAL_URL: http://gitea:3000
  FRONTEND_REPOSITORY: superpowersai/love-match-frontend-main
  FRONTEND_REF: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Install build tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          cat > /etc/apt/sources.list <<'EOF'
          deb http://mirrors.cloud.tencent.com/debian bookworm main contrib non-free non-free-firmware
          deb http://mirrors.cloud.tencent.com/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://mirrors.cloud.tencent.com/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF
          rm -rf /var/lib/apt/lists/*
          apt-get update
          apt-get install -y git curl rsync unzip openssh-client openjdk-17-jdk maven
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>aliyunmaven</id>
                <mirrorOf>*</mirrorOf>
                <name>Aliyun Maven</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF
          npm config set registry https://registry.npmmirror.com
          npm install -g npm@10.8.2 pnpm@10.33.0 --registry=https://registry.npmmirror.com
          pnpm config set registry https://registry.npmmirror.com
          java -version
          mvn -version
          node -v
          npm -v
          pnpm -v

      - name: Clone repositories
        env:
          FRONTEND_REPO_TOKEN: ${{ secrets.FRONTEND_REPO_TOKEN }}
        run: |
          test -n "${FRONTEND_REPO_TOKEN}"
          cat > /tmp/git-askpass.sh <<'EOF'
          #!/usr/bin/env sh
          case "$1" in
            *Username*) echo "keith" ;;
            *) echo "$FRONTEND_REPO_TOKEN" ;;
          esac
          EOF
          chmod +x /tmp/git-askpass.sh
          export GIT_ASKPASS=/tmp/git-askpass.sh
          export GIT_TERMINAL_PROMPT=0

          BACKEND_REF="${GITHUB_REF_NAME:-main}"
          git clone --depth 1 --branch "${BACKEND_REF}" "${GITEA_INTERNAL_URL}/superpowersai/love-match-backend.git" backend
          git clone --depth 1 --branch "${FRONTEND_REF}" "${GITEA_INTERNAL_URL}/${FRONTEND_REPOSITORY}.git" frontend

      - name: Build backend
        working-directory: backend
        run: |
          mvn -B -DskipTests clean package -pl yudao-server -am
          mkdir -p ../release/backend
          cp yudao-server/target/yudao-server.jar ../release/backend/yudao-server.jar
          test "$(wc -c < ../release/backend/yudao-server.jar)" -gt 50000000

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_URL: ''
          VITE_GLOB_API_URL: /admin-api
          NODE_OPTIONS: --max-old-space-size=3072
          TURBO_TELEMETRY_DISABLED: '1'
        run: |
          pnpm install --frozen-lockfile
          pnpm exec turbo build --filter=@vben/web-antd --concurrency=1
          mkdir -p ../release/frontend
          rm -rf ../release/frontend/*
          if [ -f apps/web-antd/dist.zip ]; then
            unzip -q apps/web-antd/dist.zip -d ../release/frontend
          else
            rsync -a --delete apps/web-antd/dist/ ../release/frontend/
          fi
          test -f ../release/frontend/index.html

      - name: Upload and deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          test -n "${SERVER_HOST}"
          test -n "${SERVER_PORT}"
          test -n "${SERVER_USER}"
          test -n "${SERVER_SSH_KEY}"
          test -n "${DEPLOY_DIR}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          printf '%s\n' "${SERVER_SSH_KEY}" | tr -d '\r' | ssh-add -

          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${DEPLOY_DIR}'"
          rsync -az --delete -e "ssh -p ${SERVER_PORT}" backend/deploy/ "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_DIR}/"
          rsync -az --delete -e "ssh -p ${SERVER_PORT}" release/ "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_DIR}/release/"
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "cd '${DEPLOY_DIR}' && chmod +x scripts/*.sh && ./scripts/deploy.sh"
